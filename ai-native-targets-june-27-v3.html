<script>
  (function(){
    // Change this password to whatever you want
    var PW = 'commonroom2026';
    var stored = sessionStorage.getItem('cr_auth');
    if(stored === PW) document.getElementById('gate').style.display='none';
  })();
  function checkPw(){
    var PW = 'commonroom2026';
    var val = document.getElementById('pw').value;
    if(val === PW){
      sessionStorage.setItem('cr_auth', PW);
      document.getElementById('gate').style.display='none';
    } else {
      document.getElementById('pw-err').textContent='Incorrect password';
      document.getElementById('pw').value='';
      document.getElementById('pw').focus();
    }
  }
</script>

const S = { ae:'all', tier:'all', sig:'all', sort:'score', q:'' };

function sc(s){ return s>=75?'#6c8fff':s>=50?'#fbbf24':'#5a6080' }
function cfg(ae){ return AE_COLORS[ae]||AE_COLORS['_'] }

function renderSidebar(){
  const counts={};
  ACCOUNTS.forEach(a=>{ counts[a.ae]=(counts[a.ae]||0)+1 });
  let html=`<div class="ae-item${S.ae==='all'?' active':''}" onclick="selectAE('all')">
    <div class="ae-avatar" style="background:rgba(108,143,255,.15);color:#6c8fff">ALL</div>
    <span class="ae-name">All AEs</span>
    <span class="ae-count">${ACCOUNTS.length}</span>
  </div><div class="sdiv"></div>`;
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([ae,cnt])=>{
    const {c,b}=cfg(ae);
    const init=ae.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const active=S.ae===ae;
    const safeAE=ae.replace(/'/g,"\x27");
    html+=`<div class="ae-item${active?' active':''}" onclick="selectAE('${safeAE}')">
      <div class="ae-avatar" style="background:${b};color:${c}">${init}</div>
      <span class="ae-name">${ae.split(' ')[0]}</span>
      <span class="ae-count">${cnt}</span>
    </div>`;
  });
  document.getElementById('ae-list').innerHTML=html;
}

function selectAE(ae){
  S.ae=ae.replace(/\x27/g,"'");
  renderSidebar();
  renderGrid();
}

function getFiltered(){
  let d=ACCOUNTS.filter(a=>{
    if(S.ae!=='all'&&a.ae!==S.ae) return false;
    if(S.tier!=='all'&&a.tier!==S.tier) return false;
    if(S.sig==='hot'&&!a.hasSignal) return false;
    if(S.q&&!a.name.toLowerCase().includes(S.q)&&!(a.website||'').toLowerCase().includes(S.q)) return false;
    return true;
  });
  if(S.sort==='score')  d.sort((a,b)=>b.score-a.score);
  if(S.sort==='alpha')  d.sort((a,b)=>a.name.localeCompare(b.name));
  if(S.sort==='signal') d.sort((a,b)=>(b.hasSignal?1:0)-(a.hasSignal?1:0)||b.score-a.score);
  return d;
}

function renderGrid(){
  const d=getFiltered();
  const strong=d.filter(a=>a.tier==='strong').length;
  const hot=d.filter(a=>a.hasSignal).length;
  const past=d.filter(a=>a.pastCustomer).length;
  document.getElementById('stats').innerHTML=`
    <span class="stat"><strong>${d.length}</strong>accounts</span>
    <span class="stat"><strong>${strong}</strong>strong fit</span>
    <span class="stat"><strong>${hot}</strong>&#x1F525; hot signal</span>
    <span class="stat"><strong>${past}</strong>&#x21BA; past customers</span>`;
  if(!d.length){
    document.getElementById('grid').innerHTML='<div class="empty">No accounts match these filters</div>';
    return;
  }
  document.getElementById('grid').innerHTML=d.map(a=>{
    const {c,b}=cfg(a.ae);
    const color=sc(a.score);
    const simTags=(a.similarTo||[]).map(s=>`<span class="sim-tag">${s}</span>`).join('');
    const sigs=[];
    if(a.signals&&a.signals.webVisit)  sigs.push(`<span class="sig s-web">&#x1F441; Web visit L30D</span>`);
    if(a.signals&&a.signals.gtmHire)   sigs.push(`<span class="sig s-hire">&#x1F4BC; ${a.signals.gtmHire}</span>`);
    if(a.signals&&a.signals.news)      sigs.push(`<span class="sig s-news">&#x1F4F0; ${a.signals.news}</span>`);
    if(a.signals&&a.signals.champMove) sigs.push(`<span class="sig s-champ">&#x1F3C6; Champion moved</span>`);
    const nameEsc=a.name.replace(/'/g,"\x27");
    return `<div class="card${a.tier==='strong'?' strong':''}" onclick="openDrawer('${nameEsc}')">
      <div class="card-top">
        <div><div class="card-name">${a.name}</div><div class="card-domain">${a.website||''}</div></div>
        <span class="ae-badge" style="background:${b};color:${c}">${a.ae.split(' ')[0]}</span>
      </div>
      ${a.pastCustomer?'<div class="past-badge">&#x21BA; Past customer</div>':''}
      <div class="score-row">
        <div class="bar-wrap"><div class="bar" style="width:${a.score}%;background:${color}"></div></div>
        <span class="score-num" style="color:${color}">${a.score}</span>
      </div>
      ${a.rationale?`<div class="rationale">${a.rationale}</div>`:''}
      ${simTags?`<div class="similar-row"><span class="sim-label">like</span>${simTags}</div>`:''}
      ${sigs.length?`<div class="sigs">${sigs.join('')}</div>`:''}
    </div>`;
  }).join('');
}

function openDrawer(name){
  const decoded=name.replace(/\x27/g,"'");
  const a=ACCOUNTS.find(x=>x.name===decoded);
  if(!a) return;
  const {c,b}=cfg(a.ae);
  const color=sc(a.score);
  document.getElementById('d-name').textContent=a.name;
  document.getElementById('d-web').textContent=a.website||'';
  const sigs=[];
  if(a.signals&&a.signals.webVisit)  sigs.push({dot:'#34c759',label:'Website visited in last 30 days (Common Room)'});
  if(a.signals&&a.signals.gtmHire)   sigs.push({dot:'#6c8fff',label:`Hiring: ${a.signals.gtmHire}`});
  if(a.signals&&a.signals.news)      sigs.push({dot:'#ffb347',label:a.signals.news});
  if(a.signals&&a.signals.champMove) sigs.push({dot:'#ff6b6b',label:'Past champion detected at new company'});
  const simTags=(a.similarTo||[]).map(s=>`<span class="sim-tag" style="font-size:12px;padding:3px 10px">${s}</span>`).join('');
  const crUrl=`https://app.commonroom.io/community/11965/organizations?search=${encodeURIComponent(a.name)}`;
  document.getElementById('drawer-body').innerHTML=`
    <div class="dsec">
      <div class="dsec-title">AE Owner</div>
      <span class="ae-badge" style="background:${b};color:${c};font-size:13px;padding:5px 14px">${a.ae}</span>
      ${a.pastCustomer?'<div class="past-warn">&#x21BA; <strong>Past customer</strong> &#x2014; confirm win-back context before outreach</div>':''}
    </div>
    <div class="dsec">
      <div class="dsec-title">Common Room Fit Score</div>
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:8px">
        <span class="score-big" style="color:${color}">${a.score}</span>
        <span class="score-sub">/ 100 &#xB7; ${a.tier} fit &#xB7; ${a.archetype}</span>
      </div>
      <div class="bar-wrap" style="height:5px"><div class="bar" style="width:${a.score}%;background:${color}"></div></div>
    </div>
    <div class="dsec">
      <div class="dsec-title">Why Common Room fits</div>
      <p>${a.rationale||''}</p>
    </div>
    ${simTags?`<div class="dsec"><div class="dsec-title">Similar to</div><div style="display:flex;gap:6px;flex-wrap:wrap">${simTags}</div></div>`:''}
    ${sigs.length?`<div class="dsec"><div class="dsec-title">Live Signals</div>
      ${sigs.map(s=>`<div class="sig-row"><div class="sig-dot" style="background:${s.dot}"></div>${s.label}</div>`).join('')}
    </div>`:''}
    <div class="dsec">
      <div class="dsec-title">Company</div>
      <p>${a.employees?a.employees.toLocaleString()+' employees':'Headcount unknown'} &#xB7; ${a.industry||'Industry unknown'}</p>
    </div>
    <a class="cr-btn" href="${crUrl}" target="_blank" rel="noopener">Open in Common Room &#x2197;</a>`;
  document.getElementById('ov').style.display='block';
  document.getElementById('drawer').style.display='flex';
}

function closeDrawer(){
  document.getElementById('ov').style.display='none';
  document.getElementById('drawer').style.display='none';
}

document.getElementById('filters').addEventListener('click',e=>{
  const btn=e.target.closest('[data-f]');
  if(!btn) return;
  const {f,v}=btn.dataset;
  S[f]=v;
  document.querySelectorAll(`[data-f="${f}"]`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
});

document.getElementById('search').addEventListener('input',e=>{
  S.q=e.target.value.toLowerCase();
  renderGrid();
});

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer(); });

renderSidebar();
renderGrid();
</script>
